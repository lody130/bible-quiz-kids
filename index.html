<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐑 어린이 성경퀴즈 🐑</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Jua','Gaegu','Malgun Gothic',sans-serif; }
  body {
    min-height:100vh;
    background: linear-gradient(135deg,#ffd3e0 0%,#ffe9a8 30%,#a8e6ff 70%,#c4f0d0 100%);
    background-attachment:fixed;
    display:flex; align-items:center; justify-content:center;
    padding:16px; overflow-x:hidden; color:#5a4a42;
  }
  body.top { align-items:flex-start; }
  body:not(.top) .card { margin-bottom:18vh; }
  .cloud { position:fixed; font-size:46px; opacity:.55; animation:float 9s ease-in-out infinite; pointer-events:none; z-index:0;}
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-22px)} }

  .card {
    position:relative; z-index:1;
    width:100%; max-width:560px;
    background:rgba(255,255,255,0.97);
    border-radius:34px;
    box-shadow:0 20px 55px rgba(255,140,170,0.35);
    padding:22px 22px 24px; text-align:center;
    border:5px solid #fff;
  }
  h1 { font-size:32px; color:#ff7aa8; margin-bottom:6px; text-shadow:2px 2px 0 #fff3; }
  .subtitle { font-size:16px; color:#b69; margin-bottom:22px; }

  .mode-list { display:grid; gap:14px; margin-top:8px; }
  .mode-btn {
    font-size:21px; font-family:inherit; color:#fff; border:none;
    border-radius:22px; padding:18px; cursor:pointer;
    box-shadow:0 7px 0 rgba(0,0,0,0.12); transition:transform .1s, box-shadow .1s;
    display:flex; align-items:center; justify-content:center; gap:10px;
  }
  .mode-btn:active { transform:translateY(5px); box-shadow:0 2px 0 rgba(0,0,0,0.12); }
  .mode-btn .big { font-size:30px; }
  .m-book{ background:linear-gradient(135deg,#ff8fb1,#ff5e95); }
  .m-yu  { background:linear-gradient(135deg,#ffb36b,#ff9a3d); }
  .m-cho { background:linear-gradient(135deg,#6bc6ff,#4aa8ff); }
  .mode-sub { font-size:13px; opacity:.95; display:block; margin-top:3px; }

  .sec-title { font-size:20px; color:#7a66ff; margin:18px 0 10px; }
  .sec-title.nt { color:#3cc488; }
  .book-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .book-btn {
    font-size:16px; font-family:inherit; color:#5a4a42;
    background:#fff7ec; border:3px solid #ffd9a8; border-radius:16px;
    padding:14px 6px; cursor:pointer; transition:transform .1s, background .2s;
  }
  .book-btn:hover { transform:translateY(-3px) scale(1.04); background:#fff0d6; }
  .book-btn .be { font-size:24px; display:block; margin-bottom:4px; }
  .book-btn.nt { border-color:#b7ecd2; background:#f1fff8; }
  .book-btn.nt:hover { background:#e1fbef; }

  .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:18px; color:#888;}
  .star-score { color:#ffac33; }
  .progress-wrap { height:14px; background:#f1eef0; border-radius:12px; overflow:hidden; margin-bottom:10px; border:2px solid #fff;}
  .progress-bar { height:100%; width:0%; background:linear-gradient(90deg,#ffd86b,#ff9a3d); transition:width .4s ease;}
  .quiz-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; }
  .quiz-title { font-size:18px; color:#ff7aa8; text-align:left; flex:1; }
  .exit-btn {
    flex-shrink:0; font-size:14px; font-family:inherit; color:#b69;
    background:#fff; border:2px solid #ffd0e0; border-radius:12px;
    padding:7px 12px; cursor:pointer; white-space:nowrap;
  }
  .exit-btn:active { background:#ffe9f0; }

  .mascot { font-size:38px; margin-bottom:2px; animation:bob 2s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-8px) rotate(4deg)} }

  .question {
    font-size:22px; color:#5a4a42; background:#fff6da;
    border-radius:22px; padding:14px 16px; margin:4px 0 12px; line-height:1.4;
    min-height:52px; display:flex; align-items:center; justify-content:center;
    border:3px dashed #ffd479;
  }
  .q-emoji { font-size:34px; display:block; margin-bottom:6px; }

  .options { display:grid; gap:9px; }
  .opt {
    font-size:19px; font-family:inherit; color:#5a4a42;
    background:#fff; border:3px solid #cdeafe; border-radius:16px;
    padding:13px; cursor:pointer; transition:transform .12s, background .2s, border-color .2s;
  }
  .opt:hover:not(:disabled){ transform:translateY(-3px) scale(1.02); border-color:#6bbcff; background:#eef7ff; }
  .opt:disabled { cursor:default; }
  .opt.correct { background:#d7f7cf; border-color:#5fd07a; color:#2e8b3d; }
  .opt.wrong   { background:#ffe0e6; border-color:#ff8aa0; color:#d24a66; }

  .feedback { margin-top:10px; font-size:18px; min-height:24px; line-height:1.45;}
  .feedback.good { color:#3aa454; }
  .feedback.bad  { color:#ef6e86; }

  .next-btn, .play-btn {
    margin-top:12px; font-size:19px; font-family:inherit; color:#fff;
    background:linear-gradient(135deg,#ff9ab0,#ff6f96); border:none;
    border-radius:18px; padding:12px 30px; cursor:pointer;
    box-shadow:0 6px 0 #e8567f; transition:transform .1s, box-shadow .1s;
  }
  .next-btn:active, .play-btn:active { transform:translateY(4px); box-shadow:0 2px 0 #e8567f; }
  .ghost-btn {
    margin-top:14px; font-size:15px; font-family:inherit; color:#b69;
    background:#fff; border:2px solid #ffd0e0; border-radius:14px;
    padding:9px 18px; cursor:pointer;
  }
  .hidden { display:none; }

  .result-emoji { font-size:78px; margin:8px 0; animation:bob 2s ease-in-out infinite;}
  .result-title { font-size:28px; color:#ff7aa8; margin-bottom:8px; }
  .result-score { font-size:22px; color:#6a5a52; margin-bottom:6px; }
  .result-msg { font-size:17px; color:#8a7a72; margin:14px 0 6px; line-height:1.6; }
  .stars-row { font-size:34px; margin:10px 0; letter-spacing:4px; }

  @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.3)} 100%{transform:scale(1)} }
  .pop { animation:pop .4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
  .shake { animation:shake .35s; }
</style>
</head>
<body>
<div class="cloud" style="top:8%;left:6%">☁️</div>
<div class="cloud" style="top:14%;right:8%;animation-delay:1.5s">⛅</div>
<div class="cloud" style="bottom:10%;left:10%;animation-delay:3s">🌈</div>
<div class="cloud" style="bottom:16%;right:7%;animation-delay:2s">⭐</div>

<div class="card">

  <!-- 모드 선택 -->
  <div id="menuScreen">
    <h1>🐑 어린이 성경퀴즈 🐑</h1>
    <p class="subtitle">어떤 퀴즈에 도전해 볼까요?</p>
    <div class="mode-list">
      <button class="mode-btn m-book" onclick="showBookPicker()">
        <span class="big">📖</span><span>성경책 골라서 풀기<span class="mode-sub">책을 고르면 그 책 문제가 나와요!</span></span></button>
      <button class="mode-btn m-yu"  onclick="startQuiz('yu')">
        <span class="big">🧸</span><span>유치부 퀴즈<span class="mode-sub">쉬워요! (5~7세)</span></span></button>
      <button class="mode-btn m-cho" onclick="startQuiz('cho')">
        <span class="big">🎒</span><span>초등부 퀴즈<span class="mode-sub">조금 어려워요! (8~13세)</span></span></button>
    </div>
  </div>

  <!-- 성경책 고르기 -->
  <div id="bookScreen" class="hidden">
    <h1>📖 성경책 고르기</h1>
    <p class="subtitle">풀고 싶은 책을 눌러보세요!</p>
    <div id="bookGridOld"></div>
    <div id="bookGridNew"></div>
    <button class="ghost-btn" onclick="toMenu()">🏠 메뉴로</button>
  </div>

  <!-- 퀴즈 -->
  <div id="quizScreen" class="hidden">
    <div class="quiz-head">
      <div class="quiz-title" id="quizTitle"></div>
      <button class="exit-btn" onclick="toMenu()">✕ 그만하기</button>
    </div>
    <div class="topbar">
      <span id="qCounter">1 / 10</span>
      <span class="star-score">⭐ <span id="score">0</span></span>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="question" id="questionBox"></div>
    <div class="options" id="optionsBox"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn hidden" id="nextBtn" onclick="nextQuestion()">다음 문제 ▶</button>
  </div>

  <!-- 결과 -->
  <div id="resultScreen" class="hidden">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle">참 잘했어요!</div>
    <div class="stars-row" id="starsRow"></div>
    <div class="result-score">획득한 별: <b id="finalScore">0</b> / <span id="finalTotal">10</span> ⭐</div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="play-btn" onclick="restart()">🔄 다시 도전</button><br>
    <button class="ghost-btn" onclick="toMenu()">🏠 메뉴로</button>
  </div>

</div>

<script>
/* ===================== 책별 퀴즈 데이터 =====================
   ※ 각 문제는 정답을 options[0]에 두고 answer:0 으로 적습니다.
     게임을 시작할 때 보기 순서를 무작위로 섞기 때문에
     매번 정답 위치가 달라지고, 많은 문제 중 일부만 뽑아 출제합니다. */
const BOOK_QUIZZES = {
  "창세기":{emoji:"🌍",testament:"old",qs:[
    {q:"하나님이 세상을 만드신 날은 모두 며칠일까요?",options:["6일","100일","1일","30일"],answer:0,explain:"6일 동안 만드시고 7일째 쉬셨어요."},
    {q:"하나님이 가장 먼저 '있으라' 하신 것은 무엇일까요?",options:["빛","바다","사람","나무"],answer:0,explain:"첫째 날 '빛이 있으라' 하셨어요."},
    {q:"에덴동산에 살던 첫 번째 사람은 누구일까요?",options:["아담","노아","요셉","모세"],answer:0,explain:"아담과 하와가 첫 사람이었어요."},
    {q:"하나님이 아담을 잠들게 하고 무엇으로 하와를 만드셨을까요?",options:["갈빗대","흙","물","나뭇잎"],answer:0,explain:"아담의 갈빗대로 하와를 만드셨어요."},
    {q:"큰 배(방주)를 만들어 홍수에서 가족을 구한 사람은?",options:["노아","아브라함","이삭","야곱"],answer:0,explain:"노아는 하나님 말씀에 순종했어요."},
    {q:"노아 때 비가 며칠 동안 내렸을까요?",options:["40일","3일","7일","100일"],answer:0,explain:"밤낮 40일 동안 비가 내렸어요."},
    {q:"홍수 후 하나님이 약속의 표로 주신 것은 무엇일까요?",options:["무지개","번개","별","눈"],answer:0,explain:"무지개는 다시 물로 심판 안 하신다는 약속이에요."},
    {q:"믿음의 조상이라 불리는 사람은 누구일까요?",options:["아브라함","사울","다윗","엘리야"],answer:0,explain:"아브라함은 하나님을 믿고 따랐어요."},
    {q:"형들에게 팔려갔지만 애굽의 총리가 된 사람은?",options:["요셉","유다","베냐민","르우벤"],answer:0,explain:"요셉은 꿈을 꾸고 애굽 총리가 됐어요."},
    {q:"아버지가 요셉에게 지어 입힌 특별한 옷은?",options:["채색옷","왕관","갑옷","신발"],answer:0,explain:"요셉은 아름다운 채색옷을 받았어요."},
    {q:"높이 쌓다가 하나님이 언어를 흩으신 탑의 이름은?",options:["바벨탑","피라미드","성전","등대"],answer:0,explain:"교만하게 쌓던 바벨탑이에요."}
  ]},
  "출애굽기":{emoji:"🌊",testament:"old",qs:[
    {q:"갈대상자에 담겨 강에 떠내려간 아기는 누구일까요?",options:["모세","아론","여호수아","갈렙"],answer:0,explain:"공주가 아기 모세를 건져 길렀어요."},
    {q:"하나님이 모세를 부르실 때 타지 않고 불붙은 것은?",options:["떨기나무","바위","구름","물"],answer:0,explain:"불붙은 떨기나무에서 말씀하셨어요."},
    {q:"하나님이 애굽에 내리신 재앙은 모두 몇 가지일까요?",options:["열 가지","세 가지","다섯 가지","백 가지"],answer:0,explain:"열 가지 재앙 후 백성이 나왔어요."},
    {q:"이스라엘 백성을 이끌고 홍해를 건넌 사람은?",options:["모세","베드로","바울","요나"],answer:0,explain:"모세가 지팡이를 들자 바다가 갈라졌어요."},
    {q:"모세의 형이자 함께 일한 사람은 누구일까요?",options:["아론","갈렙","여호수아","사무엘"],answer:0,explain:"형 아론이 모세를 도왔어요."},
    {q:"하나님이 모세에게 주신 열 가지 규칙을 무엇이라 할까요?",options:["십계명","주기도문","시편","팔복"],answer:0,explain:"시내산에서 십계명을 받았어요."},
    {q:"십계명을 받은 산의 이름은 무엇일까요?",options:["시내산","갈멜산","감람산","시온산"],answer:0,explain:"시내산에서 받았어요."},
    {q:"광야에서 하늘에서 내려준 양식의 이름은?",options:["만나","떡","포도","사과"],answer:0,explain:"만나는 매일 아침 내려온 양식이에요."}
  ]},
  "여호수아":{emoji:"🏛️",testament:"old",qs:[
    {q:"이스라엘이 외치고 돌자 무너진 성은 어디일까요?",options:["여리고성","바벨탑","예루살렘","니느웨"],answer:0,explain:"여리고성이 큰 소리에 무너졌어요."},
    {q:"모세 다음으로 백성을 이끈 지도자는 누구일까요?",options:["여호수아","갈렙","사무엘","사울"],answer:0,explain:"여호수아가 가나안 땅으로 이끌었어요."},
    {q:"여리고성을 며칠째에 일곱 바퀴 돌았을까요?",options:["7일째","1일째","3일째","40일째"],answer:0,explain:"7일째 일곱 바퀴 돌고 외쳤어요."},
    {q:"백성이 마른 땅으로 건넌 강의 이름은 무엇일까요?",options:["요단강","홍해","나일강","갈릴리 바다"],answer:0,explain:"요단강이 갈라져 마른 땅으로 건넜어요."},
    {q:"'오직 나와 내 집은 ○○를 섬기겠노라'에서 ○○는?",options:["여호와","왕","우상","사람"],answer:0,explain:"여호수아의 유명한 고백이에요."}
  ]},
  "사사기":{emoji:"💪",testament:"old",qs:[
    {q:"머리카락에 큰 힘이 있던 장사는 누구일까요?",options:["삼손","기드온","바락","입다"],answer:0,explain:"삼손은 하나님이 주신 힘을 가졌어요."},
    {q:"삼손의 힘의 비밀을 알아내려 한 여인은?",options:["들릴라","드보라","룻","한나"],answer:0,explain:"들릴라가 삼손을 꾀었어요."},
    {q:"단 300명의 용사로 미디안을 이긴 사사는?",options:["기드온","삼손","에훗","옷니엘"],answer:0,explain:"기드온은 적은 군사로 크게 이겼어요."},
    {q:"이스라엘을 다스린 지혜로운 여자 사사는 누구일까요?",options:["드보라","미리암","에스더","나오미"],answer:0,explain:"드보라는 여자 사사이자 재판관이었어요."},
    {q:"삼손의 힘은 무엇과 관련이 있었을까요?",options:["머리카락","손","눈","발"],answer:0,explain:"머리카락을 자르자 힘이 빠졌어요."}
  ]},
  "룻기":{emoji:"🌾",testament:"old",qs:[
    {q:"끝까지 시어머니를 따라간 효성스러운 며느리는?",options:["룻","한나","에스더","미리암"],answer:0,explain:"룻기의 주인공 룻이에요."},
    {q:"룻이 따라간 시어머니의 이름은 무엇일까요?",options:["나오미","사라","리브가","라헬"],answer:0,explain:"나오미를 끝까지 떠나지 않았어요."},
    {q:"룻과 결혼한 착한 밭 주인은 누구일까요?",options:["보아스","엘리","사무엘","나단"],answer:0,explain:"보아스는 룻에게 친절했어요."},
    {q:"룻이 이삭을 주운 곳은 어디일까요?",options:["보리밭","포도밭","사과밭","우물"],answer:0,explain:"보아스의 보리밭에서 이삭을 주웠어요."}
  ]},
  "사무엘상":{emoji:"🪨",testament:"old",qs:[
    {q:"물맷돌로 거인 골리앗을 이긴 소년은 누구일까요?",options:["다윗","사울","요나단","사무엘"],answer:0,explain:"다윗은 믿음으로 거인을 이겼어요."},
    {q:"다윗이 골리앗을 이길 때 사용한 무기는?",options:["물맷돌","칼","활","창"],answer:0,explain:"작은 돌멩이와 물매로 이겼어요."},

/* ===================== 공통 함수 ===================== */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// 보기 순서를 섞고 정답 위치를 다시 계산 → 매번 정답 자리가 달라짐
function prep(item){
  const correctText=item.options[item.answer];
  const opts=shuffle(item.options);
  return {...item, options:opts, answer:opts.indexOf(correctText)};
}
// 문제 묶음에서 무작위로 count개만 뽑고 보기까지 섞기
function drawQuestions(pool, count){
  return shuffle(pool).slice(0, Math.min(count, pool.length)).map(prep);
}

let questions=[], current=0, score=0, answered=false, curMode='yu', curArg=null;
const MASCOTS=["🐑","🐰","🐥","🦊","🐨","🐱","🐶","🐻","🦁","🐧","🐤","🐹"];
const PER_BOOK=8;   // 책별 퀴즈에서 한 번에 낼 문제 수(있는 만큼)

function showBookPicker(){
  document.body.classList.add('top');

  document.getElementById('bookScreen').classList.remove('hidden');

  const newNames=names.filter(n=>BOOK_QUIZZES[n].testament==='new');

  document.getElementById('bookGridNew').innerHTML=

}

function startBookQuiz(name){
  curMode='book'; curArg=name;
  const bk=BOOK_QUIZZES[name];
  questions=drawQuestions(bk.qs, PER_BOOK).map(o=>({emoji:bk.emoji,...o}));
  beginQuiz(`📖 ${name} 퀴즈`);
}

function startQuiz(mode){
  curMode=mode; curArg=null;
  let title="";
  if(mode==='yu'){ questions=drawQuestions(YU,10); title="🧸 유치부 퀴즈"; }
  else if(mode==='cho'){ questions=drawQuestions(CHO,10); title="🎒 초등부 퀴즈"; }
  beginQuiz(title);
}

function beginQuiz(title){
  current=0; score=0;
  document.body.classList.add('top');
  ['menuScreen','bookScreen','resultScreen'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('quizTitle').textContent=title;
  document.getElementById('finalTotal').textContent=questions.length;
  showQuestion();
}

function showQuestion(){
  answered=false;
  const item=questions[current];
  document.getElementById('score').textContent=score;
  document.getElementById('qCounter').textContent=(current+1)+" / "+questions.length;
  document.getElementById('progressBar').style.width=(current/questions.length*100)+"%";
  document.getElementById('questionBox').innerHTML='<div><span class="q-emoji">'+item.emoji+'</span>'+item.q+'</div>';
  const optBox=document.getElementById('optionsBox'); optBox.innerHTML='';
  item.options.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=opt; b.onclick=()=>choose(i,b);
    optBox.appendChild(b);
  });
  const fb=document.getElementById('feedback'); fb.textContent=''; fb.className='feedback';
  document.getElementById('nextBtn').classList.add('hidden');
}

function choose(i,btn){
  if(answered) return; answered=true;
  const item=questions[current];
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  if(i===item.answer){
    btn.classList.add('correct','pop'); score++;
    document.getElementById('score').textContent=score;
    fb.innerHTML="정답이에요! 🎉<br>"+item.explain; fb.className='feedback good';
    beep(true);
  } else {
    btn.classList.add('wrong','shake');
    document.querySelectorAll('.opt')[item.answer].classList.add('correct');
    fb.innerHTML="아쉬워요! 😊<br>정답: "+item.options[item.answer]+". "+item.explain; fb.className='feedback bad';
    beep(false);
  }
  document.getElementById('nextBtn').classList.remove('hidden');
}

function nextQuestion(){ current++; if(current<questions.length) showQuestion(); else showResult(); }

function showResult(){
  document.body.classList.remove('top');
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  document.getElementById('finalScore').textContent=score;
  const total=questions.length, ratio=score/total;
  let emoji,title,msg,stars;
  if(ratio===1){ emoji="🏆"; title="완벽해요! 성경박사님!"; msg="모든 문제를 다 맞혔어요! 정말 대단해요! 👏"; stars="⭐⭐⭐"; }
  else if(ratio>=0.7){ emoji="🎉"; title="참 잘했어요!"; msg="아주 훌륭해요! 조금만 더 하면 성경박사! 😊"; stars="⭐⭐"; }
  else if(ratio>=0.4){ emoji="🌟"; title="잘했어요!"; msg="좋아요! 다시 도전하면 더 잘할 수 있어요! 💪"; stars="⭐"; }
  else { emoji="🌱"; title="도전해줘서 고마워요!"; msg="괜찮아요! 또 해보면 점점 잘하게 돼요! 🤗"; stars="🌱"; }
  document.getElementById('resultEmoji').textContent=emoji;
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultMsg').textContent=msg;
  document.getElementById('starsRow').textContent=stars;
}

function restart(){ if(curMode==='book') startBookQuiz(curArg); else startQuiz(curMode); }

  document.body.classList.remove('top');
  ['quizScreen','resultScreen','bookScreen'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('menuScreen').classList.remove('hidden');
}

function beep(good){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if(good){ o.type='triangle'; o.frequency.setValueAtTime(660,ctx.currentTime); o.frequency.setValueAtTime(880,ctx.currentTime+0.12); }
    else { o.type='sine'; o.frequency.value=200; }
    g.gain.setValueAtTime(0.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
    o.start(); o.stop(ctx.currentTime+0.3);
  }catch(e){}
}
</script>
